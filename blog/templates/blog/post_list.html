<!DOCTYPE html>
<html>
<head>
    <title>Můj blog</title>
</head>
<body>
    <h1>Můj blog</h1>

    {% for post in posts %}
        <article>
            <h2>{{ post.title }}</h2>
            <p>{{ post.text|linebreaksbr }}</p>
            <small>{{ post.published_date }}</small>
            <hr>
        </article>
    {% empty %}
        <p>Zatím žádné příspěvky</p>
    {% endfor %}
</body>
</html>
